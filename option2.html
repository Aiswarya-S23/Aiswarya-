<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aiswarya — Fashion Designer (Option 2 Preview)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- Base layout (Option 1 / current) -->
  <link rel="stylesheet" href="./assets/css/style.css">
  <!-- Option 2 theme override layer -->
  <link rel="stylesheet" href="./assets/css/style-option2.css">
</head>
<body data-page="home">
  <nav class="nav" id="nav">
    <a class="nav-logo" href="#" data-route="home">Aiswarya</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="#" data-route="home">Home</a></li>
      <li><a href="#" data-route="work">Work</a></li>
      <li><a href="#" data-route="about">About</a></li>
      <li><a href="#" data-route="contact">Contact</a></li>
    </ul>
    <div class="nav-toggle" id="navToggle"><span></span><span></span><span></span></div>
  </nav>
  <main id="app"></main>
  <script src="./assets/js/main.js"></script>
  <!-- Option 2: custom dot cursor with trailing ring -->
  <script>
    (function(){
      if (!window.matchMedia('(hover:hover) and (pointer:fine)').matches) return;
      var c=document.createElement('div'); c.className='o2-cursor';
      var r=document.createElement('div'); r.className='o2-ring';
      document.body.appendChild(c); document.body.appendChild(r);
      var mx=0,my=0,rx=0,ry=0;
      document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;c.style.left=mx+'px';c.style.top=my+'px';});
      (function loop(){rx+=(mx-rx)*0.16;ry+=(my-ry)*0.16;r.style.left=rx+'px';r.style.top=ry+'px';requestAnimationFrame(loop);})();
      function on(el){el.addEventListener('mouseenter',function(){c.style.width='5px';c.style.height='5px';r.style.width='56px';r.style.height='56px';});el.addEventListener('mouseleave',function(){c.style.width='10px';c.style.height='10px';r.style.width='36px';r.style.height='36px';});}
      var obs=new MutationObserver(function(){document.querySelectorAll('a,button,.btn-link,.nav-toggle').forEach(on);});
      obs.observe(document.body,{childList:true,subtree:true});
      document.querySelectorAll('a,button,.btn-link,.nav-toggle').forEach(on);
    })();
  </script>
</body>
</html>
